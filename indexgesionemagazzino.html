<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionale Magazzino</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b0b0b;
    color: white;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #007aff;
    color: white;
    font-size: 16px;
}

#reader {
    width: 100%;
    margin-top: 10px;
}

h2 {
    margin: 0;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>🔎 Ricerca Prodotto</h2>
        <input type="text" id="search" placeholder="Nome prodotto...">
        <input type="text" id="barcode" placeholder="Codice a barre...">
        <button onclick="startScanner()">📷 Scansiona Barcode</button>
        <div id="reader"></div>
    </div>

    <div class="card">
        <h2>📦 Dettaglio Prodotto</h2>
        <p><strong>Nome:</strong> <span id="nome">-</span></p>
        <p><strong>Magazzino:</strong> <span id="magazzino">0</span></p>
        <p><strong>Macchinetta:</strong> <span id="macchinetta">0</span></p>
        <p><strong>Prezzo acquisto:</strong> € <span id="acquisto">0</span></p>
        <p><strong>Prezzo vendita:</strong> € <span id="vendita">0</span></p>
        <p><strong>Valore stock:</strong> € <span id="valore">0</span></p>
        <p><strong>Stato:</strong> <span id="stato">-</span></p>
    </div>

</div>

<script>
// DATABASE DEMO
const prodotti = [
    {
        nome: "Shampoo Auto",
        barcode: "123456789",
        magazzino: 50,
        macchinetta: 10,
        acquisto: 5,
        vendita: 10
    },
    {
        nome: "Cera Rapida",
        barcode: "987654321",
        magazzino: 20,
        macchinetta: 5,
        acquisto: 7,
        vendita: 15
    }
];

// CERCA PRODOTTO
document.getElementById("barcode").addEventListener("input", function() {
    cercaProdotto(this.value);
});

function cercaProdotto(codice) {
    const prodotto = prodotti.find(p => p.barcode === codice);
    if (prodotto) {
        mostraProdotto(prodotto);
    }
}

// MOSTRA DATI
function mostraProdotto(p) {
    document.getElementById("nome").innerText = p.nome;
    document.getElementById("magazzino").innerText = p.magazzino;
    document.getElementById("macchinetta").innerText = p.macchinetta;
    document.getElementById("acquisto").innerText = p.acquisto;
    document.getElementById("vendita").innerText = p.vendita;

    const valore = (p.magazzino + p.macchinetta) * p.acquisto;
    document.getElementById("valore").innerText = valore.toFixed(2);

    if (p.magazzino < 5) {
        document.getElementById("stato").innerText = "⚠️ Scorta bassa";
    } else {
        document.getElementById("stato").innerText = "✅ Disponibile";
    }
}

// SCANNER
function startScanner() {
    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {
            const cameraId = devices[0].id;

            html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: 250
                },
                (decodedText) => {
                    document.getElementById("barcode").value = decodedText;
                    cercaProdotto(decodedText);
                    html5QrCode.stop();
                }
            );
        }
    }).catch(err => {
        alert("Errore accesso fotocamera");
    });
}
</script>

</body>
</html>
