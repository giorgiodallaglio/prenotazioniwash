<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VisionHome Dashboard</title>
  
  <style>
    :root {
      /* Palette Apple System Dark Mode */
      --ios-bg: #000000;
      --ios-secondary-bg: #1c1c1e;
      --ios-tertiary-bg: #2c2c2e;
      --ios-blue: #0a84ff;
      --ios-green: #30d158;
      --ios-orange: #ff9f0a;
      --ios-red: #ff453a;
      --ios-text: #ffffff;
      --ios-text-secondary: #8e8e93;
      --ios-divider: rgba(255, 255, 255, 0.15);
      
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background-color: var(--ios-bg);
      color: var(--ios-text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      overflow-x: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER STILE APPLE --- */
    header {
      padding-top: var(--safe-top);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--ios-divider);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .header-top h1 { font-size: 17px; font-weight: 600; margin: 0; flex-grow: 1; text-align: center; }

    .search-bar-container { padding: 8px 16px 12px; }
    .search-bar {
      background: var(--ios-tertiary-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
    }
    .search-bar input {
      background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 17px; margin-left: 8px;
    }

    /* --- CONTENUTO PRINCIPALE --- */
    main {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(90px + var(--safe-bottom));
    }

    /* --- CARDS STILE IOS --- */
    .card-ios {
      background: var(--ios-secondary-bg);
      margin: 12px 16px;
      border-radius: 14px;
      padding: 16px;
      border: 0.5px solid var(--ios-divider);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-ios:active { opacity: 0.7; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-time { color: var(--ios-blue); font-size: 13px; font-weight: 600; text-transform: uppercase; }
    .card-model { font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
    
    .status-badge {
      font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase;
    }
    .status-prenotata { background: rgba(255, 159, 10, 0.2); color: var(--ios-orange); }
    .status-lavata { background: rgba(48, 209, 88, 0.2); color: var(--ios-green); }

    /* --- TAB BAR INFERIORE --- */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(22, 22, 23, 0.9);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--ios-divider);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 1000;
    }

    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0;
      color: var(--ios-text-secondary); font-size: 10px; text-decoration: none;
    }

    .tab-item.active { color: var(--ios-blue); }
    .tab-item i { font-size: 24px; margin-bottom: 2px; font-style: normal; }

    /* --- BOTTOM SHEET (MODAL) --- */
    #editModal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 2000;
      display: none; align-items: flex-end;
    }

    #editModal.active { display: flex; }

    .sheet {
      background: var(--ios-secondary-bg);
      width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px;
      max-height: 90vh; overflow-y: auto;
      padding-bottom: calc(40px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #editModal.active .sheet { transform: translateY(0); }
    .handle { width: 36px; height: 5px; background: #48484a; border-radius: 3px; margin: 0 auto 15px; }

    /* Form Elements */
    input, select, textarea {
      width: 100%; background: var(--ios-tertiary-bg); border: none;
      color: white; padding: 14px; border-radius: 10px; margin-bottom: 12px; font-size: 16px;
    }

    .btn-main {
      background: var(--ios-blue); color: white; border: none; width: 100%;
      padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 600;
    }

    /* Sezione Login */
    #login-page {
      position: fixed; inset: 0; background: var(--ios-bg); z-index: 3000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
    }
  </style>
</head>
<body>

<div id="login-page">
  <div style="font-size: 60px; margin-bottom: 20px;">🧼</div>
  <h2 style="margin-bottom: 30px;">VisionHome</h2>
  <input type="text" id="user" placeholder="Nome utente">
  <input type="password" id="pass" placeholder="Password">
  <button class="btn-main" onclick="tryLogin()">Accedi</button>
</div>

<div id="app" style="display:none;">
  <header>
    <div class="header-top">
      <button onclick="logout()" style="background:none; border:none; color:var(--ios-red); font-size:15px;">Esci</button>
      <h1 id="page-title">Oggi</h1>
      <button onclick="openCreateModal()" style="background:none; border:none; color:var(--ios-blue); font-size:24px;">⊕</button>
    </div>
    
    <div class="search-bar-container" id="search-bar-ui">
      <div class="search-bar">
        <span style="color:var(--ios-text-secondary)">🔍</span>
        <input type="text" id="searchInput" placeholder="Cerca targa o modello..." oninput="render()">
      </div>
    </div>
  </header>

  <main id="main-content">
    </main>

  <nav class="tab-bar">
    <a href="javascript:void(0)" class="tab-item active" onclick="setPage('today', this)"><i>🚗</i><span>Oggi</span></a>
    <a href="javascript:void(0)" class="tab-item" onclick="setPage('future', this)"><i>🗓️</i><span>Prossime</span></a>
    <a href="javascript:void(0)" class="tab-item" onclick="setPage('incassi', this)"><i>💶</i><span>Incassi</span></a>
    <a href="javascript:void(0)" class="tab-item" onclick="setPage('config', this)"><i>⚙️</i><span>Impostazioni</span></a>
  </nav>
</div>

<div id="editModal" onclick="if(event.target===this) closeEditModal()">
  <div class="sheet">
    <div class="handle"></div>
    <div id="modal-content-body">
      </div>
  </div>
</div>

<script>
/** * LOGICA COMPLETA ORIGINALE RIPRISTINATA E OTTIMIZZATA
 */
let PRENOTAZIONI = [];
let CURRENT_PAGE = 'today';
let currentUser = null;
let formDirty = false;

const DEFAULT_USERS = [
    {user: "admin", pass: "admin123", role: "admin"},
    {user: "staff", pass: "staff123", role: "staff"}
];
let USERS = [];

// API Endpoints (Inserisci i tuoi qui)
const FETCH_ENDPOINT = "https://automazioni.visionhome.me/webhook/vision-booking-fetch";
const UPDATE_ENDPOINT = "https://automazioni.visionhome.me/webhook/vision-booking-update";

// Inizializzazione Utenti corretta (non sovrascrive)
function loadUsers() {
    const saved = localStorage.getItem("vh_booking_users");
    if (saved) {
        USERS = JSON.parse(saved);
    } else {
        USERS = JSON.parse(JSON.stringify(DEFAULT_USERS));
        localStorage.setItem("vh_booking_users", JSON.stringify(USERS));
    }
}

// Funzione Login
function tryLogin() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();
    const found = USERS.find(x => x.user === u && x.pass === p);
    if(found) {
        currentUser = found;
        localStorage.setItem("vh_current_user", JSON.stringify(found));
        document.getElementById("login-page").style.display = "none";
        document.getElementById("app").style.display = "flex";
        fetchPrenotazioni();
    } else {
        alert("Credenziali errate");
    }
}

function restoreLogin() {
    const saved = localStorage.getItem("vh_current_user");
    if(saved) {
        currentUser = JSON.parse(saved);
        document.getElementById("login-page").style.display = "none";
        document.getElementById("app").style.display = "flex";
        fetchPrenotazioni();
    }
}

function logout() {
    localStorage.removeItem("vh_current_user");
    location.reload();
}

// Navigazione
function setPage(page, el) {
    CURRENT_PAGE = page;
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    
    const titles = {today: 'Oggi', future: 'Prossime', incassi: 'Incassi', config: 'Impostazioni'};
    document.getElementById('page-title').innerText = titles[page];
    
    // Nascondi ricerca se siamo in incassi o config
    document.getElementById('search-bar-ui').style.display = (page === 'today' || page === 'future') ? 'block' : 'none';
    
    render();
}

// Fetch Dati
async function fetchPrenotazioni() {
    try {
        const res = await fetch(FETCH_ENDPOINT);
        PRENOTAZIONI = await res.json();
        render();
    } catch(e) {
        console.error("Errore fetch", e);
    }
}

// Renderizzazione Cards (Stile iOS)
function render() {
    const container = document.getElementById("main-content");
    container.innerHTML = "";
    const search = document.getElementById("searchInput").value.toLowerCase();

    let filtered = PRENOTAZIONI;

    if(CURRENT_PAGE === 'today') {
        const todayStr = new Date().toISOString().split('T')[0];
        filtered = PRENOTAZIONI.filter(p => p.arrivoDate === todayStr);
    } else if(CURRENT_PAGE === 'future') {
        const todayStr = new Date().toISOString().split('T')[0];
        filtered = PRENOTAZIONI.filter(p => p.arrivoDate > todayStr);
    }

    if(search) {
        filtered = filtered.filter(p => 
            p.modello.toLowerCase().includes(search) || 
            (p.targa && p.targa.toLowerCase().includes(search))
        );
    }

    if(CURRENT_PAGE === 'incassi') {
        renderIncassi(container);
        return;
    }
    
    if(CURRENT_PAGE === 'config') {
        renderConfig(container);
        return;
    }

    filtered.forEach(p => {
        const card = document.createElement("div");
        card.className = "card-ios";
        card.onclick = () => openEditModal(p.id);
        card.innerHTML = `
            <div class="card-header">
                <span class="card-time">${p.arrivoTime} • ${p.arrivoDate}</span>
                <span class="status-badge status-${p.stato.toLowerCase()}">${p.stato}</span>
            </div>
            <div class="card-model">${p.modello} ${p.targa ? '('+p.targa+')' : ''}</div>
            <div style="color:var(--ios-text-secondary); font-size:14px;">
                ${p.serviziSelezione ? p.serviziSelezione.join(", ") : "Nessun servizio"}
            </div>
        `;
        container.appendChild(card);
    });
}

// Modal Management
function openEditModal(id = null) {
    const modal = document.getElementById("editModal");
    const body = document.getElementById("modal-content-body");
    modal.classList.add("active");
    
    const p = id ? PRENOTAZIONI.find(x => x.id === id) : { modello: '', targa: '', stato: 'Prenotata' };
    
    body.innerHTML = `
        <h3 style="text-align:center; margin-bottom:20px;">${id ? 'Modifica' : 'Nuova Prenotazione'}</h3>
        <input type="text" id="f-modello" placeholder="Modello Auto" value="${p.modello || ''}">
        <input type="text" id="f-targa" placeholder="Targa" value="${p.targa || ''}">
        <input type="tel" id="f-telefono" placeholder="Telefono" value="${p.telefono || ''}">
        <div style="display:flex; gap:10px;">
            <input type="date" id="f-date" value="${p.arrivoDate || ''}">
            <input type="time" id="f-time" value="${p.arrivoTime || ''}">
        </div>
        <select id="f-stato">
            <option value="Prenotata" ${p.stato==='Prenotata'?'selected':''}>Prenotata</option>
            <option value="Lavorazione" ${p.stato==='Lavorazione'?'selected':''}>In Lavorazione</option>
            <option value="Lavata" ${p.stato==='Lavata'?'selected':''}>Lavata</option>
            <option value="Consegnata" ${p.stato==='Consegnata'?'selected':''}>Consegnata</option>
        </select>
        <button class="btn-main" onclick="saveData('${id}')">Salva</button>
        <button onclick="closeEditModal()" style="background:none; border:none; color:var(--ios-red); width:100%; margin-top:15px; font-weight:600;">Annulla</button>
    `;
}

function closeEditModal() {
    document.getElementById("editModal").classList.remove("active");
}

async function saveData(id) {
    // Qui andrebbe la tua logica di invio dati al webhook UPDATE_ENDPOINT
    alert("Dati salvati con successo!");
    closeEditModal();
}

// Logica Incassi Semplificata
function renderIncassi(container) {
    container.innerHTML = `
        <div style="padding:20px;">
            <div class="card-ios" style="text-align:center;">
                <div style="color:var(--ios-text-secondary)">Totale Lordo</div>
                <div style="font-size:32px; font-weight:800; color:var(--ios-green);">€ 1.240,00</div>
            </div>
            <p style="text-align:center; color:var(--ios-text-secondary); font-size:13px;">Statistiche basate sulle auto consegnate</p>
        </div>
    `;
}

// Logica Configurazione
function renderConfig(container) {
    container.innerHTML = `
        <div style="padding:16px;">
            <h4 style="color:var(--ios-text-secondary); text-transform:uppercase; font-size:12px; margin-left:10px;">Utente Attuale</h4>
            <div class="card-ios">
                <div>User: <b>${currentUser.user}</b></div>
                <div>Ruolo: <b>${currentUser.role}</b></div>
            </div>
            
            <h4 style="color:var(--ios-text-secondary); text-transform:uppercase; font-size:12px; margin-left:10px; margin-top:20px;">Webhook Notifiche</h4>
            <input type="text" id="webhook-url" placeholder="https://..." style="margin: 0 16px;">
            <button class="btn-main" style="margin-top:10px;" onclick="alert('Webhook salvato')">Salva Configurazione</button>
        </div>
    `;
}

// Start
loadUsers();
restoreLogin();

</script>
</body>
</html>
