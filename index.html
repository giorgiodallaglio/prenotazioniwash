<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VisionHome Dashboard</title>
  
  <style>
    :root {
      /* Palette Colori Apple System */
      --system-bg: #000000;
      --secondary-bg: #1c1c1e;
      --tertiary-bg: #2c2c2e;
      --label-primary: #ffffff;
      --label-secondary: #8e8e93;
      --accent-blue: #007aff;
      --accent-green: #34c759;
      --accent-orange: #ff9500;
      --accent-red: #ff3b30;
      --divider: rgba(255, 255, 255, 0.12);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--system-bg);
      color: var(--label-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.4;
      user-select: none;
    }

    /* --- HEADER STILE IOS --- */
    .ios-header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding-top: var(--safe-top);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--divider);
    }
    
    .header-content {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }

    .header-content h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
    }

    /* --- FILTRI E RICERCA --- */
    .search-container {
      padding: 8px 16px 12px;
    }

    .ios-search-bar {
      background: var(--tertiary-bg);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ios-search-bar input {
      background: transparent;
      border: none;
      color: white;
      font-size: 17px;
      width: 100%;
      outline: none;
    }

    /* --- LISTA PRENOTAZIONI (CARD) --- */
    .main-scroll {
      padding: 12px 0 100px 0;
    }

    .card-ios {
      background: var(--secondary-bg);
      margin: 0 16px 12px;
      border-radius: 14px;
      padding: 16px;
      transition: background 0.2s;
      border: 0.5px solid var(--divider);
    }

    .card-ios:active { background: #3a3a3c; }

    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .time-badge {
      color: var(--accent-blue);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .car-model {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .status-tag {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .status-prenotata { background: rgba(255, 149, 0, 0.2); color: var(--accent-orange); }
    .status-lavata { background: rgba(52, 199, 89, 0.2); color: var(--accent-green); }

    /* --- TAB BAR INFERIORE --- */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--divider);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 1000;
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      color: var(--label-secondary);
      font-size: 10px;
      font-weight: 500;
      text-decoration: none;
    }

    .tab-item.active { color: var(--accent-blue); }

    .tab-item i {
      font-size: 24px;
      margin-bottom: 2px;
    }

    /* --- MODAL / SHEET STILE IOS --- */
    .ios-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
      align-items: flex-end;
    }

    .ios-modal.active { display: flex; }

    .sheet {
      background: var(--secondary-bg);
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      padding-bottom: calc(30px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ios-modal.active .sheet { transform: translateY(0); }

    .handle {
      width: 36px; height: 5px; background: #48484a; border-radius: 3px; margin: 0 auto 15px;
    }

    .btn-primary {
      background: var(--accent-blue);
      color: white;
      border: none;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="app">
  <header class="ios-header">
    <div class="header-content">
      <span id="login-info" style="font-size: 13px; color: var(--label-secondary)"></span>
      <h1 id="page-title">Oggi</h1>
      <div onclick="logout()" style="color: var(--accent-red); font-size: 14px;">Esci</div>
    </div>
    
    <div class="search-container" id="search-bar-ui">
      <div class="ios-search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Cerca targa o modello..." oninput="render()">
      </div>
    </div>
  </header>

  <main class="main-scroll" id="main-content">
    </main>

  <nav class="tab-bar">
    <a href="javascript:void(0)" class="tab-item active" onclick="setPage('today', this)">
      <i>🚗</i>
      <span>Oggi</span>
    </a>
    <a href="javascript:void(0)" class="tab-item" onclick="setPage('future', this)">
      <i>🗓️</i>
      <span>Prossime</span>
    </a>
    <a href="javascript:void(0)" class="tab-item" onclick="setPage('incassi', this)">
      <i>💶</i>
      <span>Incassi</span>
    </a>
    <a href="javascript:void(0)" class="tab-item" onclick="toggleMenu()">
      <i>⚙️</i>
      <span>Impostazioni</span>
    </a>
  </nav>
</div>

<div id="editModal" class="ios-modal" onclick="if(event.target===this) closeEditModal()">
  <div class="sheet">
    <div class="handle"></div>
    <div id="modal-body">
      </div>
    <button class="btn-primary" onclick="saveBooking()">Salva</button>
  </div>
</div>

<script>
  /* QUI INSERISCI TUTTA LA TUA LOGICA ORIGINALE (LE 1000 RIGHE)
     MA CON QUESTE PICCOLE CORREZIONI:
  */

  // 1. Correzione Caricamento Utenti
  function loadUsers() {
    const saved = localStorage.getItem("vh_booking_users");
    if (saved) {
      try {
        USERS = JSON.parse(saved);
      } catch(e) {
        USERS = JSON.parse(JSON.stringify(DEFAULT_USERS));
      }
    } else {
      USERS = JSON.parse(JSON.stringify(DEFAULT_USERS));
      localStorage.setItem("vh_booking_users", JSON.stringify(USERS));
    }
  }

  // 2. Correzione Render Card (Stile Apple)
  // Sostituisci la parte dove generi l'HTML della card con questa struttura:
  function createCardHTML(p) {
    return `
      <div class="card-ios" onclick="showDetail('${p.id}')">
        <div class="card-header">
          <span class="time-badge">${p.arrivoTime} • ${p.arrivoDate}</span>
          <span class="status-tag status-${p.stato.toLowerCase()}">${p.stato}</span>
        </div>
        <div class="car-model">${p.modello}</div>
        <div style="color: var(--label-secondary); font-size: 14px; margin-top: 4px;">
          ${p.serviziSelezione.join(', ')}
        </div>
      </div>
    `;
  }

  // ... (Continua con tutte le tue funzioni fetch, update, delete) ...
  
  // Inizializzazione
  loadUsers();
  // ... resto delle chiamate originali
</script>

</body>
</html>
