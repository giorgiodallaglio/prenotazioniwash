<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>VisionHome Booking</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

/* LOGIN */
.login-backdrop{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0f14;
}

.login-card{
  background:#11161d;
  padding:25px;
  border-radius:16px;
  width:300px;
  border:1px solid #273041;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #273041;
  background:#0f141a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f6feb;
  color:white;
  margin-top:15px;
}

/* APP */
.container{
  padding:16px;
}

.card{
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  border:1px solid #202735;
}

/* COLORI STATO */
.prenotata{
  background:linear-gradient(135deg, rgba(255,184,0,0.2), rgba(255,140,0,0.1));
}
.inlavaggio{
  background:linear-gradient(135deg, rgba(59,130,246,0.2), rgba(30,64,175,0.1));
}
.lavata{
  background:linear-gradient(135deg, rgba(34,197,94,0.2), rgba(22,101,52,0.1));
}
.consegnata{
  background:linear-gradient(135deg, rgba(148,163,184,0.2), rgba(71,85,105,0.1));
}
.noshow{
  background:linear-gradient(135deg, rgba(239,68,68,0.2), rgba(127,29,29,0.1));
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBackdrop" class="login-backdrop">
  <div class="login-card">

    <h2>Accesso</h2>

    <label>Utente</label>
    <input id="loginUser">

    <label style="margin-top:10px;display:block">Password</label>
    <div style="position:relative">
      <input id="loginPassword" type="password" style="padding-right:40px">
      <span onclick="togglePassword()" style="
        position:absolute;
        right:10px;
        top:10px;
        cursor:pointer;
      ">👁️</span>
    </div>

    <button onclick="login()">Entra</button>

  </div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none"></div>

<script>

// UTENTI STABILI
const USERS = {
  giorgio:{password:"Batman2024!",role:"admin"},
  karen:{password:"Chloe2025!",role:"admin"},
  michele:{password:"michele123",role:"operator"},
  marco:{password:"marco123",role:"operator"},
  riccardo:{password:"riccardo123",role:"operator"},
  vittorio:{password:"vittorio123",role:"operator"}
};

// LOGIN
function login(){
  const user = document.getElementById("loginUser").value.trim().toLowerCase();
  const pass = document.getElementById("loginPassword").value;

  if(USERS[user] && USERS[user].password === pass){
    document.getElementById("loginBackdrop").style.display="none";
    document.getElementById("app").style.display="block";
    loadDemo();
  } else {
    alert("Credenziali errate");
  }
}

// OCCHIO PASSWORD
function togglePassword(){
  const input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
}

// DEMO APP (POI COLLEGHIAMO AL TUO DATABASE)
function loadDemo(){
  const data = [
    {modello:"Golf", stato:"Prenotata"},
    {modello:"Audi A3", stato:"In lavaggio"},
    {modello:"BMW X1", stato:"Lavata"},
    {modello:"Panda", stato:"Consegnata"},
    {modello:"Mini", stato:"No-show"}
  ];

  const statoClass = {
    "Prenotata":"prenotata",
    "In lavaggio":"inlavaggio",
    "Lavata":"lavata",
    "Consegnata":"consegnata",
    "No-show":"noshow"
  };

  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(i=>{
    const div = document.createElement("div");
    div.className = "card " + statoClass[i.stato];
    div.innerHTML = `<strong>${i.modello}</strong><br>${i.stato}`;
    app.appendChild(div);
  });
}

</script>

</body>
</html>
